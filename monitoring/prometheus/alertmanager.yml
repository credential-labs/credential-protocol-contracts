global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: credentialprotocol-ops

receivers:
  - name: credentialprotocol-ops
    # Configure your notification channel here.
    # Example: Slack webhook
    # slack_configs:
    #   - api_url: "<SLACK_WEBHOOK_URL>"
    #     channel: "#credentialprotocol-alerts"
    #     title: "{{ .GroupLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
